    </div>
    <div class="modal-password">

    </div>
    <div class="modal-error" id="modalError"></div>
    <div class="modal-actions">

// Password verification
const EXPECTED_HASH = '4b646bdc7157d75613bf0687b246227f039b74e48623a7ec1387461b493ba36a';

async function verifyPassword(input) {
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(input));
  const hashHex = Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
  return hashHex === EXPECTED_HASH;
}

// Local overrides
let overrides = {};
const STORAGE_KEY = 'sino_overrides_v2';

function loadOverrides() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) overrides = JSON.parse(saved);
  } catch (e) { overrides = {}; }
}

function saveOverrides() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(overrides));
}

function applyOverrides() {
  Object.keys(overrides).forEach(key => {
    const parts = key.split('::');
    if (parts.length !== 3) return;
    const [prov, school, idx] = parts;
    const provData = DATA[prov];
    if (!provData) return;
    const schoolData = provData.find(s => s.school === school);
    if (schoolData && schoolData.projects[idx]) {
      Object.assign(schoolData.projects[idx], overrides[key]);
    }
  });
}

// Edit modal
let currentEditKey = null;

function openEditModal(prov, school, idx) {
  const schoolData = DATA[prov] && DATA[prov].find(s => s.school === school);
  if (!schoolData) return;
  const p = schoolData.projects[idx];
  if (!p) return;

  currentEditKey = `${prov}::${school}::${idx}`;
  document.getElementById('modalSubtitle').textContent = `${school} · ${p.major}`;
  document.getElementById('modalEdu').value = p.edu || '';
  document.getElementById('modalLang').value = p.lang || '';
  document.getElementById('modalExp').value = p.exp || '';
  document.getElementById('modalQuota').value = p.quota || '';
  document.getElementById('modalDur').value = p.dur || '';
  document.getElementById('modalFee').value = p.fee || '';
  document.getElementById('modalTier').value = p.tier || '暂未分级';
  document.getElementById('modalPassword').value = '';
  document.getElementById('modalError').textContent = '';
  document.getElementById('editModal').classList.add('active');
}

function closeModal() {
  document.getElementById('editModal').classList.remove('active');
  currentEditKey = null;
}

async function submitEdit() {
  if (!currentEditKey) return;

  const password = document.getElementById('modalPassword').value.trim();
  if (!password) {
    document.getElementById('modalError').textContent = '请输入密码';
    return;
  }

  const valid = await verifyPassword(password);
  if (!valid) {
    document.getElementById('modalError').textContent = '密码错误';
    return;
  }

  const parts = currentEditKey.split('::');
  if (parts.length !== 3) return;
  const [prov, school, idx] = parts;
  const schoolData = DATA[prov] && DATA[prov].find(s => s.school === school);
  if (!schoolData) return;

  const p = schoolData.projects[idx];
  p.edu = document.getElementById('modalEdu').value.trim();
  p.lang = document.getElementById('modalLang').value.trim();
  p.exp = document.getElementById('modalExp').value.trim();
  p.quota = document.getElementById('modalQuota').value.trim();
  p.dur = document.getElementById('modalDur').value.trim();
  p.fee = document.getElementById('modalFee').value.trim();
  p.tier = document.getElementById('modalTier').value;

  overrides[currentEditKey] = { edu: p.edu, lang: p.lang, exp: p.exp, quota: p.quota, dur: p.dur, fee: p.fee, tier: p.tier };
  saveOverrides();

  renderContent();
  closeModal();
}

  const el = document.getElementById('tierChips');
  el.innerHTML = [
    `<button class="tier-chip ${activeTier === '' ? 'active' : ''}" data-tier="" style="background:${activeTier === '' ? '#2b6cb0' : ''};color:${activeTier === '' ? '#fff' : ''};border-color:${activeTier === '' ? '#2b6cb0' : ''}">全部</button>`,
    ...ALL_TIERS.map(t => `<button class="tier-chip ${activeTier === t ? 'active' : ''}" data-tier="${t}">${t}</button>`)
  ].join('');
}

function renderSchoolFilter() {
  const schools = DATA[activeProvince] || [];
  const el = document.getElementById('schoolFilter');
  el.innerHTML = `<option value="">全部院校</option>` +
    schools.map(s => `<option value="${s.school}" ${activeSchool === s.school ? 'selected' : ''}>${s.school}</option>`).join('');
}

function renderProvinceSelect() {
  const el = document.getElementById('provinceSelect');
  el.innerHTML = provinces.map(p => 
    `<button class="province-btn ${p === activeProvince ? 'active' : ''}" data-prov="${p}">${p}</button>`
  ).join('');
}

function renderContent() {
  const main = document.getElementById('mainContent');
  const schools = DATA[activeProvince] || [];
  const stats = document.getElementById('stats');
  const searchVal = document.getElementById('searchInput').value.toLowerCase().trim();
  
  let totalProjects = 0;
  let visibleSchools = 0;
  let html = '';
  
  schools.forEach((school, schoolIdx) => {
    if (activeSchool && school.school !== activeSchool) return;
    
    const filtered = school.projects.filter(p => {
      if (activeTier && (p.tier || '暂未分级') !== activeTier) return false;
      if (searchVal) {
        const searchStr = [p.major, p.foreign, p.edu, p.lang, p.exp, school.school, p.tier, p.fee]
          .filter(Boolean).join(' ').toLowerCase();
        if (!searchStr.includes(searchVal)) return false;
      }
      return true;
    });
    
    if (filtered.length === 0) return;
    visibleSchools++;
    totalProjects += filtered.length;
    
    const accentIdx = (schoolIdx % ACCENT_COLORS) + 1;
    
    html += `
    <div class="school-group" data-school="${school.school}">
      <div class="school-header s-header-${accentIdx}">
        <div class="school-name">${school.school}</div>
        <div class="school-meta">
          <span class="school-count">${filtered.length}个项目</span>
        </div>
      </div>
      <div class="school-body">
        <div class="card-list">
          ${filtered.map((p, idx) => renderCard(p, accentIdx, school.school, school.projects.indexOf(p), activeProvince)).join('')}
        </div>
      </div>
    </div>`;
  });
  
  if (totalProjects === 0) {
    html = `<div class="empty-state">
      <svg viewBox="0 0 64 64" fill="none" stroke="#a0aec0" stroke-width="2"><circle cx="27" cy="27" r="12"/><path d="m36 36 10 10"/></svg>
      <p>${searchVal || activeTier || activeSchool ? '未找到匹配项目，换个筛选条件试试' : '暂无项目数据'}</p>
    </div>`;
  }
  
  main.innerHTML = html;

  let statsParts = [activeProvince];
  if (activeTier) statsParts.push(`分级: ${activeTier}`);
  if (activeSchool) statsParts.push(activeSchool);
  statsParts.push(`<span>${visibleSchools}</span> 所院校 · <span>${totalProjects}</span> 个项目`);
  stats.innerHTML = statsParts.join(' · ');
}

function getTierClass(tier) {
  const map = { 'A+': 't-ap', 'A': 't-a', 'B': 't-b', 'C': 't-c', 'D': 't-d', '暂未分级': 't-unk' };
  return map[tier] || 't-unk';
}

function renderCard(p, accentIdx, schoolName, projectIdx, province) {
  const tier = p.tier || '暂未分级';
  const tierCls = getTierClass(tier);
  const isNew = !p.fee || p.fee === '新批详询';
  const feeCls = isNew ? ' fee-new' : '';
  return `
    <div class="card c-accent-${accentIdx}">
      <span class="tier-badge ${tierCls}" title="分级: ${tier}">${tier}</span>
      <div class="card-major-block">
        <div class="card-major">${p.major}</div>
        <div class="card-foreign">${p.foreign}</div>
      </div>
      <div class="card-field">
        <div class="card-field-label">学历要求</div>
        <div class="card-field-value">${p.edu || '<span class="not-available">待查</span>'}</div>
      </div>
      <div class="card-field">
        <div class="card-field-label">语言要求</div>
        <div class="card-field-value">${p.lang || '<span class="not-available">待查</span>'}</div>
      </div>
      <div class="card-field" style="flex:0 0 90px;">
        <div class="card-field-label">工作经验</div>
        <div class="card-field-value">${p.exp || '<span class="not-available">-</span>'}</div>
      </div>
      <div class="card-field" style="flex:0 0 64px;">
        <div class="card-field-label">人数</div>
        <div class="card-field-value">${p.quota || '-'}</div>
      </div>
      <div class="card-field" style="flex:0 0 48px;">
        <div class="card-field-label">学制</div>
        <div class="card-field-value">${p.dur || '-'}</div>
      </div>
      <div class="card-field-fee" title="${p.fee || ''}">
        <div class="card-field-label">学费</div>
        <span class="card-fee-value${feeCls}">${p.fee || '<span class="not-available">待查</span>'}</span>
      </div>
      ${p.note ? `<span class="card-note" title="${p.note}">${p.note}</span>` : ''}
      <button class="card-edit" onclick="event.stopPropagation();openEditModal('${province}', '${schoolName}', ${projectIdx})" title="更新信息">✎</button>
    </div>`;
}

  activeSchool = e.target.value;
  renderContent();
});

document.getElementById('editModal').addEventListener('click', (e) => {
  if (e.target === document.getElementById('editModal')) closeModal();
});

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && document.getElementById('editModal').classList.contains('active')) {
    closeModal();
  }
  if (e.key === 'Enter' && document.activeElement === document.getElementById('modalPassword')) {
    e.preventDefault();
    submitEdit();
  }
});

// 禁止复制 & 禁止右键
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('copy', e => e.preventDefault());
document.addEventListener('dragstart', e => e.preventDefault());
document.addEventListener('selectstart', e => { if (!/input|textarea|select/i.test(e.target.tagName)) e.preventDefault(); });
document.addEventListener('keydown', e => {
  const t = e.target.tagName.toLowerCase();
  if (t === 'input' || t === 'textarea' || t === 'select') return true;
  if ((e.ctrlKey || e.metaKey) && ['c','a','s','u','p','x','v'].includes(e.key.toLowerCase())) {
    e.preventDefault(); return false;
  }
  if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I')) {
    e.preventDefault(); return false;
  }
});

// Init
loadOverrides();
applyOverrides();
renderProvinceSelect();
renderTierChips();
renderSchoolFilter();
renderContent();
</script>

</body>
</html>
